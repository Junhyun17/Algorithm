<html>
  <head>
    <meta charset="utf-8" />
    <meta name="author" content="junhyun" />
    <meta
      name="description"
      content="이 웹페이지는 직접 작성한 회원가입 코드를 실행한 웹사이트입니다."
    />
    <meta name="keywords" content="HTML,  meta태그, form태그, 웹개발" />
    <title>회원가입</title>
  </head>
  <body>
    <h1>회원가입</h1>
    <hr />
    <form action="signup.html" method="post">
      <fieldset>
        <legend>로그인 정보</legend>
        <label for="username">아이디:</label>
        <input type="text" id="username" />
        <br />
        <label for="password">비밀번호:</label>
        <input type="password" id="password" placeholder="비밀번호 입력" />
      </fieldset>
      <fieldset>
        <legend>개인 정보</legend>
        <label for="email">이메일:</label>
        <input type="text" id="email" />
        <br />
        <label>성별: <input type="radio" name="gender" value="m" />남성 </label>
        <label><input type="radio" name="gender" value="f" />여성</label>
        <br />
        <label for="phone">전화번호:</label>
        <input type="text" id="phone" />
        <br />
        <label for="hometown">출생지: </label>
        <select id="hometown" name="hometown">
          <option value="seoul">서울</option>
          <option value="busan">부산</option>
          <option value="daegu">대구</option>
          <option value="incheon">인천</option>
          <option value="daejeon">대전</option>
          <option value="gwangju">광주</option>
          <option value="ulsan">울산</option>
        </select>
        <br />
        <label for="message">하고 싶은 말: </label>
        <br />
        <textarea
          id="message"
          name="message"
          rows="5"
          cols="40"
          placeholder="이곳에 하고 싶은 말을 입력해주세요!!"
        ></textarea>
      </fieldset>
      <label
        ><input type="checkbox" name="agree" value="agree" />개인정보를 수집하는
        데 동의합니다.</label
      >
      <br />
      <input type="submit" value="회원가입" />
    </form>
  </body>
</html>
